  <style>
    :root {
      --neon-blue: #00f2ff;
      --neon-pink: #ff007a;
      --bg-dark: #0d0d0f;
      --bg-card: #1a1a1e;
      --text-main: #ffffff;
      --text-dim: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.1);
      --font-display: 'Black Han Sans', sans-serif;
    }

    body { 
      background: var(--bg-dark); 
      color: var(--text-main); 
      font-family: 'Pretendard', sans-serif; 
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    .v39-header {
      text-align: center;
      padding: 60px 20px 40px;
      background: linear-gradient(180deg, #1a0a1a 0%, var(--bg-dark) 100%);
      border-bottom: 1px solid var(--border-color);
    }
    .v39-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 8vw, 3.5rem);
      background: linear-gradient(135deg, #ffffff 40%, var(--neon-blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .tab-btn {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tab-btn.active {
      background: var(--neon-pink);
      border-color: var(--neon-pink);
      color: white;
      box-shadow: 0 0 15px rgba(255, 0, 122, 0.4);
    }

    .product-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .product-card:hover {
      border-color: var(--neon-blue);
      transform: translateY(-8px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 242, 255, 0.1);
    }

    .img-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      background: #252529;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .img-container img.loaded {
      opacity: 1;
    }

    .error-placeholder {
      position: absolute;
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      padding: 10px;
    }

    .status-dot { 
      width: 8px; 
      height: 8px; 
      background: #22c55e; 
      border-radius: 50%; 
      box-shadow: 0 0 8px #22c55e;
      animation: pulse 2s infinite; 
    }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

    // 탭 버튼 동적 생성
    function initTabs() {
      const container = document.getElementById('tab-container');
      Object.keys(CAT_DATA).forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn px-6 py-2.5 rounded-full border border-white/10 text-sm font-semibold whitespace-nowrap';
        btn.innerText = cat;
        btn.onclick = (e) => filterItems(cat, e.target);
        container.appendChild(btn);
      });
    }

    function renderProducts(category = 'all') {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = '';
      
      let items = [];
      if (category === 'all') {
        Object.values(CAT_DATA).forEach(arr => items = [...items, ...arr]);
      } else {
        items = CAT_DATA[category] || [];
      }

      items.forEach((item, index) => {
        const card = document.createElement('a');
        card.href = item.url;
        card.target = "_blank";
        card.className = "product-card rounded-2xl overflow-hidden flex flex-col";
        
        card.innerHTML = `
          <div class="img-container">
            <div class="error-placeholder">IMAGE LOADING...</div>
            <img src="${item.image}" 
                 alt="${item.name}" 
                 onload="this.classList.add('loaded')"
                 onerror="handleImageError(this)">
            <div class="absolute top-2 left-2 bg-blue-600/90 text-[9px] font-black px-2 py-1 rounded text-white backdrop-blur-sm shadow-xl">ROCKET</div>
          </div>
          <div class="p-4 flex-grow flex flex-col gap-3">
            <h3 class="text-[13px] leading-snug h-9 overflow-hidden font-medium text-slate-300 group-hover:text-white transition-colors">
              ${item.name}
            </h3>
            <div class="mt-auto">
              <div class="text-[10px] text-slate-500 font-semibold mb-1 uppercase tracking-tighter">Limited Offer</div>
              <div class="text-[1.2rem] font-bold text-[#00f2ff] tracking-tight" style="font-family: 'Black Han Sans', sans-serif;">
                ${Number(item.price).toLocaleString()}원
              </div>
            </div>
            <div class="w-full py-2.5 bg-white/5 border border-white/10 rounded-xl text-[11px] font-bold text-center hover:bg-[#00f2ff] hover:text-[#0d0d0f] transition-all">
              구매하러 가기
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function handleImageError(img) {
      img.style.display = 'none';
      const container = img.parentElement;
      container.innerHTML = `<div class="text-slate-600 text-[10px] text-center px-4 font-semibold uppercase">Image<br>Unavailable</div>`;
    }

    function filterItems(category, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProducts(category);
    }

    const now = new Date();
    document.getElementById('update-time').innerText = `${now.getFullYear()}. ${now.getMonth() + 1}. ${now.getDate()}. ${now.getHours() < 12 ? 'AM' : 'PM'} ${now.getHours() % 12 || 12}:${now.getMinutes().toString().padStart(2, '0')}`;

    window.addEventListener('DOMContentLoaded', () => {
      initTabs();
      renderProducts('all');
    });
  </script>
