  <style>
    :root {

    .custom-btn { display: inline-block; padding: 10px 18px; background-color: #1e1e24; color: #f0f0f0 !important; text-decoration: none !important; border-radius: 10px; border: 1px solid #2a2a32; font-size: 13px; font-weight: 700; transition: all 0.3s ease; }
    .custom-btn:hover { background: linear-gradient(135deg, #ff4444, #ff8c00); border-color: #ff4444; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 68, 68, 0.3); }

    .tab-btn { transition: all 0.3s ease; }
    .tab-btn.active { background: var(--neon-pink); border-color: var(--neon-pink); color: white; box-shadow: 0 0 15px rgba(255, 0, 122, 0.4); }

    /* 상품 카드 이미지 영역 수정 */
    .product-card { background: var(--bg-card); border: 1px solid var(--border-color); transition: all 0.3s ease; display: flex; flex-direction: column; height: 100%; }
    .product-card:hover { border-color: var(--neon-blue); transform: translateY(-8px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); }

    .img-container { position: relative; width: 100%; aspect-ratio: 1/1; background: #252529; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .img-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s ease; }
    .img-container img.loaded { opacity: 1; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    @media (max-width: 768px) { .custom-btn { flex: 1 1 calc(45% - 12px); text-align: center; font-size: 11px; } }

    // 이미지 에러 핸들러 분리 (따옴표 오류 원천 차단)
    function handleImgError(el) {
      el.parentElement.innerHTML = '<div class="text-slate-600 text-[11px] font-bold">Image<br>Unavailable</div>';
    }

    function renderProducts(category = 'all') {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = '';
      let items = [];
      if (category === 'all') {
        Object.values(CAT_DATA).forEach(arr => items = [...items, ...arr]);
      } else {
        items = CAT_DATA[category] || [];
      }

      items.forEach((item) => {
        const card = document.createElement('a');
        card.href = item.url;
        card.target = "_blank";
        card.className = "product-card rounded-2xl overflow-hidden";
        
        card.innerHTML = `
          <div class="img-container">
            <img src="${item.image}" 
                 alt="product" 
                 onload="this.classList.add('loaded')" 
                 onerror="handleImgError(this)">
            <div class="absolute top-2 left-2 bg-blue-600/90 text-[9px] font-black px-2 py-1 rounded text-white">ROCKET</div>
          </div>
          <div class="p-4 flex-grow flex flex-col justify-between gap-3">
            <h3 class="text-[13px] leading-snug h-9 overflow-hidden font-medium text-slate-300">
              ${item.name}
            </h3>
            <div>
              <div class="text-[1.2rem] font-bold text-[#00f2ff]" style="font-family: 'Black Han Sans', sans-serif;">
                ${Number(item.price).toLocaleString()}원
              </div>
              <div class="w-full mt-3 py-2 bg-white/5 border border-white/10 rounded-xl text-[11px] font-bold text-center text-slate-400">구매하러 가기</div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function filterItems(category, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProducts(category);
    }

    window.addEventListener('DOMContentLoaded', () => { renderProducts('all'); });
  </script>
